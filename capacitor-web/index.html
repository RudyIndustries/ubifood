<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#181715" />
    <title>UBIFOOD</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;

        background: #f7f4ed;
        color: #181715;
        font-family: Arial, sans-serif;

      main { width: min(86vw, 360px); text-align: center; }
      img { width: min(74vw, 270px); height: auto; }
      h1 { margin: 20px 0 8px; font-size: 24px; }
      p { margin: 0; color: #68635e; font-size: 14px; line-height: 1.5; }
    </style>
  </head>
  <body>
    <main>
      <img src="./icon-512.png" alt="La Paz, Capital del Cielo" />
      <h1>UBIFOOD</h1>
      <p>Conecta la URL de Vercel antes de compilar la aplicacion Android.</p>
    </main>

</html>
